name: Build & Deploy Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          CAPACITOR_BUILD: 'true' 

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync
        run: |
          rm -rf android/app/src/main/assets/public/
          npx cap sync android
          # Créer le fichier manquant si absent
          if [ ! -f android/capacitor-cordova-android-plugins/cordova.variables.gradle ]; then
            mkdir -p android/capacitor-cordova-android-plugins
            echo "ext {" > android/capacitor-cordova-android-plugins/cordova.variables.gradle
            echo "}" >> android/capacitor-cordova-android-plugins/cordova.variables.gradle
            echo "✅ cordova.variables.gradle créé"
          fi
          ls android/capacitor-cordova-android-plugins/

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/kingmenu-release.keystore

      - name: Fix JAVA_HOME
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV
          java -version

      - name: Build release AAB
        run: |
          cd android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/kingmenu-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease             -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/kingmenu-release.keystore             -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}             -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}             -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Save AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: kingmenu-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Save APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kingmenu-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
